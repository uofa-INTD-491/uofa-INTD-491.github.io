<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">MNIST Vercel Demo poster</title>
  <desc id="desc">Abstract poster artwork with digit tiles, a prediction panel, and chart bars.</desc>
  <defs>
    <linearGradient id="mnist-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edf2f8" />
      <stop offset="100%" stop-color="#cfd9e8" />
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#mnist-bg)" rx="36" />
  <rect x="70" y="70" width="1060" height="180" rx="30" fill="#1f2d3a" />
  <rect x="70" y="290" width="420" height="390" rx="28" fill="#ffffff" opacity="0.92" />
  <rect x="530" y="290" width="250" height="390" rx="28" fill="#121212" />
  <rect x="820" y="290" width="310" height="180" rx="28" fill="#ffffff" opacity="0.94" />
  <rect x="820" y="500" width="310" height="180" rx="28" fill="#ffffff" opacity="0.9" />
  <g fill="#8ca4c5">
