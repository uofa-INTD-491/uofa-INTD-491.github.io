    <rect x="920" y="510" width="28" height="120" rx="10" />
    <rect x="970" y="470" width="28" height="160" rx="10" />
    <rect x="1020" y="565" width="28" height="65" rx="10" />
  </g>
  <g fill="#1f2d3a">
    <rect x="130" y="360" width="120" height="120" rx="22" />
    <rect x="290" y="360" width="120" height="120" rx="22" />
    <rect x="130" y="520" width="120" height="120" rx="22" />
    <rect x="290" y="520" width="120" height="120" rx="22" />
  </g>
  <g fill="#ffffff" font-family="Georgia, serif" font-size="72" font-weight="700" text-anchor="middle">
    <text x="190" y="442">2</text>
    <text x="350" y="442">7</text>
    <text x="190" y="602">4</text>
    <text x="350" y="602">9</text>
  </g>
  <g fill="#ffffff">
    <circle cx="655" cy="396" r="22" />
    <circle cx="655" cy="470" r="22" />
    <circle cx="655" cy="544" r="22" />
    <circle cx="655" cy="618" r="22" />
  </g>
  <text x="118" y="164" fill="#ffffff" font-family="Georgia, serif" font-size="58" font-weight="700">MNIST Vercel Demo</text>
  <text x="118" y="224" fill="#d8e4f1" font-family="Arial, sans-serif" font-size="30">Dataset overview, drawing canvas, and live CNN prediction</text>
