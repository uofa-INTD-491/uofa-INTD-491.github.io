<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Neighborhood Heat Risk Atlas poster</title>
  <desc id="desc">Abstract poster artwork with map panels and heat overlays.</desc>
  <defs>
    <linearGradient id="heat-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1d9" />
      <stop offset="100%" stop-color="#f5c6a2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#heat-bg)" rx="36" />
  <rect x="70" y="70" width="1060" height="190" rx="30" fill="#2b2b2d" />
  <rect x="70" y="300" width="500" height="380" rx="30" fill="#ffffff" opacity="0.92" />
  <rect x="610" y="300" width="520" height="180" rx="30" fill="#ffffff" opacity="0.92" />
  <rect x="610" y="500" width="520" height="180" rx="30" fill="#c75b39" />
  <g opacity="0.85">
    <rect x="130" y="360" width="170" height="120" rx="18" fill="#f5c26b" />
    <rect x="320" y="360" width="170" height="120" rx="18" fill="#ef8758" />
    <rect x="225" y="500" width="170" height="120" rx="18" fill="#d24a43" />
  </g>
  <g fill="#173042" opacity="0.22">
    <circle cx="735" cy="390" r="42" />
    <circle cx="842" cy="390" r="42" />
    <circle cx="949" cy="390" r="42" />
  </g>
  <text x="118" y="165" fill="#ffffff" font-family="Georgia, serif" font-size="56" font-weight="700">Neighborhood Heat Risk Atlas</text>
  <text x="118" y="224" fill="#f7d9bf" font-family="Arial, sans-serif" font-size="29">Comparing exposure, shade, and cooling access</text>
</svg>
