<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Transit Access Storyboard poster</title>
  <desc id="desc">Abstract poster artwork with route frames and accessibility waypoints.</desc>
  <defs>
    <linearGradient id="transit-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5eef9" />
      <stop offset="100%" stop-color="#c6d5e7" />
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#transit-bg)" rx="36" />
  <rect x="70" y="70" width="1060" height="180" rx="30" fill="#173042" />
  <g fill="#ffffff" opacity="0.93">
    <rect x="70" y="300" width="240" height="360" rx="26" />
    <rect x="340" y="300" width="240" height="360" rx="26" />
    <rect x="610" y="300" width="240" height="360" rx="26" />
    <rect x="880" y="300" width="250" height="360" rx="26" />
  </g>
  <g fill="none" stroke="#0f79d0" stroke-width="10" stroke-linecap="round">
    <path d="M155 520h70" />
    <path d="M425 470h70" />
    <path d="M695 560h70" />
    <path d="M970 430h70" />
  </g>
  <g fill="#c75b39">
    <circle cx="190" cy="430" r="18" />
    <circle cx="460" cy="540" r="18" />
    <circle cx="730" cy="420" r="18" />
    <circle cx="1005" cy="590" r="18" />
  </g>
  <text x="120" y="164" fill="#ffffff" font-family="Georgia, serif" font-size="58" font-weight="700">Transit Access Storyboard</text>
  <text x="120" y="224" fill="#d9e7f5" font-family="Arial, sans-serif" font-size="30">Sequencing route barriers into an explainable journey</text>
</svg>
